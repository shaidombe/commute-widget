<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>זמן נסיעה למשרד</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      background: transparent;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .widget {
      background: rgba(20, 25, 45, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 22px 26px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 560px;
    }

    /* Top section - main info */
    .main-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    /* Left: route info with status dot */
    .route-section {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }

    .traffic-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s infinite;
      transition: all 0.5s ease;
    }

    .traffic-dot.green { background: #22c55e; box-shadow: 0 0 14px rgba(34, 197, 94, 0.9); }
    .traffic-dot.orange { background: #f97316; box-shadow: 0 0 14px rgba(249, 115, 22, 0.9); }
    .traffic-dot.red { background: #ef4444; box-shadow: 0 0 14px rgba(239, 68, 68, 0.9); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.15); }
    }

    .route-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .route {
      font-size: 16px;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .route strong { color: #ffffff; font-weight: 700; }

    .via {
      font-size: 12px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400;
    }

    .via .via-icon {
      margin-left: 4px;
      font-size: 11px;
      opacity: 0.7;
    }

    /* Right: time info */
    .time-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      line-height: 1;
    }

    .arrival {
      font-size: 36px;
      font-weight: 700;
      font-family: 'SF Mono', 'Courier New', monospace;
      letter-spacing: -1px;
      line-height: 1;
      transition: color 0.5s ease;
    }

    .arrival.green { color: #22c55e; }
    .arrival.orange { color: #f97316; }
    .arrival.red { color: #ef4444; }

    .duration-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 6px;
    }

    .arrival-label {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .duration {
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 500;
      font-family: 'SF Mono', 'Courier New', monospace;
    }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
    }

    .delay-info {
      font-weight: 600;
      color: #f97316;
    }
    .delay-info.clear { color: #22c55e; }
    .delay-info.heavy { color: #ef4444; }
    .delay-info.sleeping { color: #94a3b8; font-weight: 400; }

    .updated {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      font-weight: 400;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .live-dot.sleeping { background: #64748b; animation: none; }

    /* Sleeping state */
    .sleeping-state {
      text-align: center;
      padding: 8px 0;
    }

    .sleeping-state .icon { font-size: 28px; margin-bottom: 8px; }
    .sleeping-state .msg { font-size: 15px; color: #cbd5e1; font-weight: 500; }
    .sleeping-state .next { font-size: 12px; color: #94a3b8; margin-top: 4px; }

    /* Error / loading */
    .error {
      color: #f97316;
      font-size: 13px;
      padding: 20px;
      text-align: center;
      line-height: 1.6;
    }

    .setup {
      padding: 15px;
      text-align: center;
      font-size: 13px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="widget" id="widget">
    <div class="setup">⏳ טוען נתונים...</div>
  </div>

  <script>
    // ============================================
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbxYuqebSJ-QhU_Hn7upQ0icNyJ8z7haWJHqeojYHELHR2yCNiX86Gc9oLT7nncdP9Vj/exec";

    const REFRESH_INTERVAL_MS = 5 * 60 * 1000;
    const MORNING_START = 8;
    const MORNING_END = 14;
    const EVENING_START = 15;
    const EVENING_END = 23;
    const ACTIVE_DAYS = [0, 1, 2, 3, 4];
    // ============================================

    const widget = document.getElementById('widget');
    let lastFetchTime = null;
    let lastRenderedData = null;

    function getIsraelTime() {
      const now = new Date();
      const israelString = now.toLocaleString('en-US', { timeZone: 'Asia/Jerusalem' });
      const israelDate = new Date(israelString);
      return { day: israelDate.getDay(), hour: israelDate.getHours(), date: israelDate };
    }

    function getActiveWindow() {
      const { day, hour } = getIsraelTime();
      if (!ACTIVE_DAYS.includes(day)) return { active: false, direction: null };
      if (hour >= MORNING_START && hour < MORNING_END) return { active: true, direction: 'to_office' };
      if (hour >= EVENING_START && hour < EVENING_END) return { active: true, direction: 'to_home' };
      return { active: false, direction: null };
    }

    function getTrafficLevel(durationSec, durationInTrafficSec) {
      const ratio = durationInTrafficSec / durationSec;
      if (ratio < 1.15) return 'green';
      if (ratio < 1.4) return 'orange';
      return 'red';
    }

    function formatTimeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 5) return 'עודכן כעת';
      if (seconds < 60) return `לפני ${seconds} שניות`;
      const mins = Math.floor(seconds / 60);
      if (mins === 1) return 'לפני דקה';
      if (mins < 60) return `לפני ${mins} דק'`;
      const hours = Math.floor(mins / 60);
      const remainingMins = mins % 60;
      if (hours === 1 && remainingMins === 0) return 'לפני שעה';
      if (remainingMins === 0) return `לפני ${hours} שעות`;
      return `לפני ${hours}:${String(remainingMins).padStart(2, '0')} שעות`;
    }

    function formatArrivalTime(minutesFromNow) {
      const israel = getIsraelTime();
      const arrival = new Date(israel.date.getTime() + minutesFromNow * 60 * 1000);
      const hh = String(arrival.getHours()).padStart(2, '0');
      const mm = String(arrival.getMinutes()).padStart(2, '0');
      return `${hh}:${mm}`;
    }

    function getNextActiveTime() {
      const { day, hour } = getIsraelTime();
      if (ACTIVE_DAYS.includes(day)) {
        if (hour < MORNING_START) return `היום ב-${MORNING_START}:00`;
        if (hour >= MORNING_END && hour < EVENING_START) return `היום ב-${EVENING_START}:00`;
      }
      let daysUntilActive = 1;
      while (!ACTIVE_DAYS.includes((day + daysUntilActive) % 7)) daysUntilActive++;
      const dayNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
      return `${dayNames[(day + daysUntilActive) % 7]} ב-${MORNING_START}:00`;
    }

    function renderSleeping() {
      widget.innerHTML = `
        <div class="sleeping-state">
          <div class="icon">😴</div>
          <div class="msg">מחוץ לשעות נסיעה</div>
          <div class="next">מתחדש: ${getNextActiveTime()}</div>
        </div>
        <div class="footer">
          <div class="delay-info sleeping">מצב חיסכון</div>
          <div class="updated">
            <div class="live-dot sleeping"></div>
            <span>חוסך קריאות</span>
          </div>
        </div>
      `;
    }

    function renderError(message) {
      widget.innerHTML = `<div class="error">⚠️ ${message}</div>`;
    }

    function renderData(data) {
      lastRenderedData = data;
      const { minutes, minutesNoTraffic, level, lastUpdate, direction, routeSummary } = data;
      const delay = minutes - minutesNoTraffic;

      let delayText, delayClass = '';
      if (delay <= 2) { delayText = '🟢 זורם'; delayClass = 'clear'; }
      else if (delay <= 8) delayText = `🟠 +${delay} דק' מהרגיל`;
      else { delayText = `🔴 +${delay} דק' מהרגיל`; delayClass = 'heavy'; }

      const fromTo = direction === 'to_office'
        ? '<strong>הבית</strong> ← <strong>סלסטור</strong>'
        : '<strong>סלסטור</strong> ← <strong>הבית</strong>';

      const arrivalTime = formatArrivalTime(minutes);
      const viaLine = routeSummary
        ? `<div class="via"><span class="via-icon">🛣️</span>דרך ${routeSummary}</div>`
        : '';

      widget.innerHTML = `
        <div class="main-row">
          <div class="route-section">
            <div class="traffic-dot ${level}"></div>
            <div class="route-text">
              <div class="route">${fromTo}</div>
              ${viaLine}
            </div>
          </div>
          <div class="time-section">
            <div class="arrival ${level}">${arrivalTime}</div>
            <div class="duration-line">
              <span class="arrival-label">הגעה</span>
              <span class="duration">· ${minutes} דק' נסיעה</span>
            </div>
          </div>
        </div>
        <div class="footer">
          <div class="delay-info ${delayClass}">${delayText}</div>
          <div class="updated">
            <div class="live-dot"></div>
            <span>${formatTimeAgo(lastUpdate)}</span>
          </div>
        </div>
      `;
    }

    async function fetchCommute() {
      if (PROXY_URL.includes('PASTE_YOUR_SCRIPT_URL_HERE')) return;

      const win = getActiveWindow();
      const direction = win.direction || (getIsraelTime().hour < 13 ? 'to_office' : 'to_home');

      try {
        const response = await fetch(`${PROXY_URL}?dir=${direction}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        if (data.error) { renderError(data.error); return; }

        renderData({
          minutes: data.minutes,
          minutesNoTraffic: data.minutesNoTraffic,
          level: getTrafficLevel(data.durationSec, data.durationInTrafficSec),
          lastUpdate: new Date(),
          direction: data.direction,
          routeSummary: data.routeSummary
        });
      } catch (err) {
        console.error(err);
        renderError('לא ניתן להתחבר לשרת: ' + err.message);
      }
    }

    function tick() {
      const win = getActiveWindow();
      if (win.active) fetchCommute();
      else renderSleeping();
    }

    // רענון תצוגת הזמן כל שנייה - בלי קריאה ל-API
    function refreshTimestampOnly() {
      if (!lastRenderedData) return;

      // עדכן את הקאונטר "עודכן לפני X"
      const updatedSpan = document.querySelector('.updated span');
      if (updatedSpan) {
        updatedSpan.textContent = formatTimeAgo(lastRenderedData.lastUpdate);
      }

      // עדכן את שעת ההגעה - חישוב דינמי: השעה הנוכחית + זמן הנסיעה האחרון הידוע
      const arrivalEl = document.querySelector('.arrival');
      if (arrivalEl) {
        arrivalEl.textContent = formatArrivalTime(lastRenderedData.minutes);
      }
    }

    if (!PROXY_URL.includes('PASTE_YOUR_SCRIPT_URL_HERE')) {
      tick();
      setInterval(tick, REFRESH_INTERVAL_MS);
      setInterval(refreshTimestampOnly, 1000); // רענון הקאונטר החי כל שנייה
    }
  </script>
</body>
</html>
